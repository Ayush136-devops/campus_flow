name: campus_flow
description: "CampusFlow - Navigate your campus"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  animations: ^2.0.11
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true

  # Asset declaration starts here
  assets:
    - assets/logo.png